name: QA

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements/base.txt
          python -m pip install ruff

      - name: Django system check
        run: python manage.py check

      - name: Unit and smoke tests
        run: python scripts/run_tests.py

      - name: Lint changed core modules
        run: |
          python -m ruff check tpweb/services/pipeline_status.py
          python -m ruff check tpweb/views/HealthView.py tpweb/middleware/observability.py
          python -m ruff check scripts/run_tests.py tpweb/tests.py
