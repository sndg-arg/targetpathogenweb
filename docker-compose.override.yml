services:
  db:
    volumes:
      - ./dbs/db:/var/lib/postgresql/data
  web:
    deploy:
      resources:
        limits:
          memory: 4g
          cpus: '2.0'
    volumes:
      - ./:/app/targetpathogenweb
      - ./data:/app/targetpathogenweb/data
      - ./fasttarget_mac:/app/fasttarget
      # Redireccionamos el target original /ssh-agent para que no falle el montaje de Mac
      - ./dummy_ssh:/ssh-agent
      # Montamos el socket real de Mac si Docker Desktop esta configurado (opcional pero util)
      - /run/host-services/ssh-auth.sock:/run/host-services/ssh-auth.sock
    environment:
      # Configuramos la variable para que el contenedor use el socket magico de Mac
      - SSH_AUTH_SOCK=/run/host-services/ssh-auth.sock
      - PYTHONPATH=/app/sndgjobs:/app/sndgbiodb:/app/targetpathogen:/app/sndg-bio:/app/target
