{% extends "account/base.html" %}
{% load i18n %}
{% load crispy_forms_tags %}

{% block inner %}
    <div class="auth-header">
        <h1>{% trans "Change password" %}</h1>
        <p>{% trans "Enter your current password and choose a new one." %}</p>
    </div>

    <form class="auth-form password_change" method="POST" action="{% url 'account_change_password' %}">
        {% csrf_token %}
        {{ form|crispy }}
        <div class="auth-submit">
            <button class="btn tp-btn tp-btn--primary" type="submit">{% trans "Change password" %}</button>
        </div>
    </form>
{% endblock %}
