{% extends "account/base.html" %}
{% load i18n %}

{% block inner %}
    <div class="auth-header">
        <h1>{% trans "Check your email" %}</h1>
    </div>
    <p class="auth-message">{% trans "We sent you a password reset link. Please check your inbox and follow the instructions." %}</p>
    <div class="auth-footer">
        <a href="{% url 'account_login' %}">{% trans "Back to sign in" %}</a>
    </div>
{% endblock %}
