{% extends "account/base.html" %}
{% load i18n %}
{% load crispy_forms_tags %}

{% block inner %}
    <div class="auth-header">
        <h1>{% trans "Create account" %}</h1>
        <p>{% blocktrans %}Already have an account? <a href="{{ login_url }}">Sign in</a>.{% endblocktrans %}</p>
    </div>

    <form class="signup auth-form" id="signup_form" method="post" action="{% url 'account_signup' %}">
        {% csrf_token %}
        {{ form|crispy }}
        {% if redirect_field_value %}
            <input type="hidden" name="{{ redirect_field_name }}" value="{{ redirect_field_value }}">
        {% endif %}
        <div class="auth-submit">
            <button class="btn tp-btn tp-btn--primary" type="submit">{% trans "Create account" %}</button>
        </div>
    </form>
{% endblock %}
