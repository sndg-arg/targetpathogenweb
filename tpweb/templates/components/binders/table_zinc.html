{% load i18n %}
<div class="binder-table-wrap">
    <table class="binder-tbl tp-table tp-table--plain">
        <thead>
            <tr>
                <th scope="col">{% trans "Ligand" %}</th>
                <th scope="col" class="binder-tbl__score-col">{% trans "Tanimoto" %}</th>
                <th scope="col">{% trans "SMILES" %}</th>
            </tr>
        </thead>
        <tbody>
            {% for binder in binder_list %}
                <tr class="binder-tbl__row" data-href="{% url 'tpwebapp:binder_detail' binder_id=binder.id %}">
                    <td class="binder-tbl__name">{{ binder.name }}</td>
                    <td class="binder-tbl__score">
                        {% if binder.score is not None %}{{ binder.score|floatformat:3 }}{% else %}<span class="binder-tbl__score-empty">—</span>{% endif %}
                    </td>
                    <td class="binder-tbl__smiles"><code>{{ binder.smiles|truncatechars:60 }}</code></td>
                </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
