{% with clear_classes=classes|default:"btn btn-outline-secondary tp-btn-with-icon" %}
    {% if href and not disabled %}
        <a href="{{ href }}" class="{{ clear_classes }}">
            <span class="tp-btn-icon" aria-hidden="true">
                {% include "components/icons/trash.html" %}
            </span>
            {{ label }}
        </a>
    {% else %}
        <button type="{{ button_type|default:'button' }}" class="{{ clear_classes }}" {% if disabled %}disabled{% endif %}>
            <span class="tp-btn-icon" aria-hidden="true">
                {% include "components/icons/trash.html" %}
            </span>
            {{ label }}
        </button>
    {% endif %}
{% endwith %}
